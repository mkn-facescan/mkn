<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikana Face Terminal</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; padding: 0; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* 🔥 FULL SCREEN GEOFENCE LOCK */
        #lockScreen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: opacity 0.5s; }
        #lockScreen h1 { color: #ef4444; font-size: 36px; margin: 0 0 10px 0; font-weight: 900; letter-spacing: 1px; }
        #lockScreen p { color: #94a3b8; font-size: 16px; font-weight: 600; max-width: 400px; line-height: 1.5; }
        #lockScreen .spinner { width: 40px; height: 40px; border: 4px solid rgba(99, 102, 241, 0.3); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { display: flex; width: 100%; height: 100%; }

        /* LEFT SIDE - CAMERA */
        .camera-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }
        
        .header { position: absolute; top: 30px; text-align: center; z-index: 10; }
        .header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: 1px; color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .header p { margin: 0; font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }

        #syncIndicator { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; color: #cbd5e1; display: none; align-items: center; gap: 8px; z-index: 20; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .dot { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; box-shadow: 0 0 10px #6366f1; } to { opacity: 0.3; box-shadow: 0 0 0 transparent;} }

        .camera-wrapper { position: relative; width: 100%; max-width: 600px; aspect-ratio: 3/4; background: #1e293b; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 4px solid #334155; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); z-index: 5; pointer-events: none; }
        
        .scan-overlay { position: absolute; inset: 0; border-radius: 30px; z-index: 6; pointer-events: none; }
        .scan-overlay::after { content: ''; position: absolute; top: 10%; left: 10%; right: 10%; bottom: 10%; border: 2px dashed rgba(99, 102, 241, 0.4); border-radius: 20px; }

        .status { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); background: #1e293b; padding: 12px 25px; border-radius: 99px; font-size: 15px; font-weight: 700; color: #e2e8f0; border: 1px solid #334155; z-index: 10; white-space: nowrap; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status.ready { border-color: #6366f1; color: #818cf8; }
        .status.processing { border-color: #f59e0b; color: #fbbf24; background: #451a03; }
        .status.success { border-color: #10b981; color: #34d399; background: #064e3b; }
        .status.error { border-color: #ef4444; color: #f87171; background: #450a0a; }

        /* RIGHT SIDE - LOGS */
        .log-panel { width: 350px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; }
        .log-header { padding: 25px 20px; border-bottom: 1px solid #334155; }
        .log-header h2 { margin: 0; font-size: 18px; font-weight: 800; color: #f8fafc; }
        .log-header p { margin: 4px 0 0 0; font-size: 12px; color: #94a3b8; }
        
        .log-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .log-history::-webkit-scrollbar { width: 6px; }
        .log-history::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .log-item { background: #0f172a; border-radius: 12px; padding: 15px; border-left: 4px solid #6366f1; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .log-item.success { border-left-color: #10b981; }
        .log-item.error { border-left-color: #ef4444; }
        .log-time { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 4px; }
        .log-name { font-size: 14px; font-weight: 700; color: #f8fafc; margin: 0; }
        .log-msg { font-size: 12px; font-weight: 600; margin: 4px 0 0 0; color: #34d399; }
        .log-item.error .log-msg { color: #f87171; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .log-panel { width: 100%; height: 30vh; border-left: none; border-top: 1px solid #334155; }
            .camera-section { height: 70vh; padding-bottom: 80px; }
            .camera-wrapper { max-height: 100%; }
        }
    </style>
</head>
<body onload="verifyLocationAndStart()">

    <div id="lockScreen">
        <div id="lockSpinner" class="spinner"></div>
        <h1 id="lockTitle">Verifying Location</h1>
        <p id="lockMsg">Checking if this terminal is within the allowed office zone...</p>
    </div>

    <div class="container">
        <div class="camera-section">
            <div id="syncIndicator"><div class="dot"></div> Syncing Database...</div>
            <div class="header">
                <h1>MIKANA</h1>
                <p>Facial Recognition Terminal</p>
            </div>

            <div class="camera-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <div id="overlay" class="scan-overlay"></div>
            </div>
            
            <div id="status" class="status">Initializing System...</div>
        </div>

        <div class="log-panel">
            <div class="log-header">
                <h2>Recent Scans</h2>
                <p>Live attendance feed</p>
            </div>
            <div class="log-history" id="logHistory">
                <div style="text-align:center; color:#64748b; font-size:12px; margin-top:20px;">Waiting for scans...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 🔥 GEOFENCE GATEKEEPER 🔥
        // ==========================================
        const OFFICE_LAT = 14.6438; // <-- Change to your actual Mikana Office Latitude
        const OFFICE_LNG = 120.9845; // <-- Change to your actual Mikana Office Longitude
        const MAX_ALLOWED_METERS = 20; // <-- Maximum allowed distance

        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const deltaP = (lat2-lat1) * Math.PI/180;
            const deltaLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(deltaP/2) * Math.sin(deltaP/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }

        function verifyLocationAndStart() {
            const lockScreen = document.getElementById('lockScreen');
            const lockTitle = document.getElementById('lockTitle');
            const lockMsg = document.getElementById('lockMsg');
            const lockSpinner = document.getElementById('lockSpinner');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        let currentLat = position.coords.latitude;
                        let currentLng = position.coords.longitude;

                        // 🛠️ UNCOMMENT THESE TWO LINES TO FAKE YOUR LOCATION FOR TESTING:
                        // currentLat = 14.599510; 
                        // currentLng = 120.984210;

                        let distance = getDistanceInMeters(OFFICE_LAT, OFFICE_LNG, currentLat, currentLng);

                        if (distance > MAX_ALLOWED_METERS) {
                            // 🛑 BLOCK ACCESS PERMANENTLY
                            lockSpinner.style.display = 'none';
                            lockTitle.textContent = "🔒 Access Denied";
                            lockMsg.textContent = `This terminal is ${distance} meters away from the office. You must be inside the building to open the scanner.`;
                        } else {
                            // ✅ SUCCESS! UNLOCK THE APP AND START SCANNING
                            lockScreen.style.opacity = '0';
                            setTimeout(() => { lockScreen.style.display = 'none'; }, 500);
                            startScanner();
                        }
                    },
                    function(error) {
                        lockSpinner.style.display = 'none';
                        lockTitle.textContent = "📍 GPS Error";
                        lockMsg.textContent = "Could not verify your location. Please ensure Location Services are turned ON and refresh the page.";
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                lockSpinner.style.display = 'none';
                lockTitle.textContent = "Unsupported Device";
                lockMsg.textContent = "This device does not have a GPS chip. Cannot verify location.";
            }
        }


        // ==========================================
        // 2. SCANNER LOGIC (Unchanged, lightning fast)
        // ==========================================
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusEl = document.getElementById('status');
        const logHistoryEl = document.getElementById('logHistory');
        const syncIndicator = document.getElementById('syncIndicator');

        let faceMatcher = null;
        let isLogging = false;

        async function startScanner() {
            statusEl.textContent = 'Loading AI Models...';
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights')
                ]);
                bootWithOfflineMemory();
            } catch (e) {
                statusEl.textContent = 'Error loading models.';
                statusEl.className = 'status error';
            }
        }

        async function bootWithOfflineMemory() {
            statusEl.textContent = 'Checking memory...';
            const localData = localStorage.getItem('mikana_face_db');
            
            if (localData) {
                try {
                    await createFaceMatcher(JSON.parse(localData));
                    startCamera(); 
                    syncWithServer(false); 
                } catch (e) {
                    syncWithServer(true);
                }
            } else {
                statusEl.textContent = 'Downloading Database...';
                syncWithServer(true);
            }
        }

        function syncWithServer(isFirstBoot) {
            if (!isFirstBoot) syncIndicator.style.display = 'flex'; 
            
            google.script.run.withSuccessHandler(async function(data) {
                if (!data || data.length === 0) return;
                localStorage.setItem('mikana_face_db', JSON.stringify(data));
                await createFaceMatcher(data);
                syncIndicator.style.display = 'none';
                if (isFirstBoot) startCamera();
            }).withFailureHandler(function(err) {
                syncIndicator.style.display = 'none';
                if (isFirstBoot) {
                    statusEl.textContent = 'Network Error. Please refresh.';
                    statusEl.className = 'status error';
                }
            }).getEmployeeDataForMatcher();
        }

        async function createFaceMatcher(data) {
            const labeledDescriptors = data.map(emp => {
                const descriptors = JSON.parse(emp.descriptors).map(d => new Float32Array(Object.values(d)));
                return new faceapi.LabeledFaceDescriptors(emp.label, descriptors);
            });
            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45); 
            statusEl.textContent = 'Ready. Face the camera.';
            statusEl.className = 'status ready';
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
            }).then(stream => {
                video.srcObject = stream;
                handleVideo();
            }).catch(err => {
                statusEl.textContent = 'Camera permission denied.';
                statusEl.className = 'status error';
            });
        }

        function handleVideo() {
            video.addEventListener('play', () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.querySelector('.camera-wrapper').append(canvas);
                const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                faceapi.matchDimensions(canvas, displaySize);

                setInterval(async () => {
                    if (isLogging || !faceMatcher) return;

                    const detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.6 }))
                        .withFaceLandmarks()
                        .withFaceDescriptors();

                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                    if (resizedDetections.length > 0) {
                        const detection = resizedDetections[0];
                        const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

                        const box = detection.detection.box;
                        const ctx = canvas.getContext('2d');
                        ctx.lineWidth = 4;
                        ctx.strokeStyle = bestMatch.label !== 'unknown' ? '#10b981' : '#ef4444';
                        ctx.strokeRect(box.x, box.y, box.width, box.height);

                        if (bestMatch.label !== 'unknown') {
                            logAttendance(bestMatch.label);
                        } else {
                            statusEl.textContent = 'Unknown Face';
                            statusEl.className = 'status error';
                        }
                    } else {
                        statusEl.textContent = 'Ready. Face the camera.';
                        statusEl.className = 'status ready';
                    }
                }, 150);
            });
        }

        // ==========================================
        // 3. FAST LOGGING (No GPS delay here!)
        // ==========================================
        function logAttendance(label) {
            isLogging = true;
            let parts = label.split(" | ");
            let code = parts[0];
            let name = parts[1] || code;

            statusEl.textContent = `Logging ${name}...`;
            statusEl.className = 'status processing';

            // Send immediately to Server.js (using your existing function!)
            google.script.run.withSuccessHandler(function(res) {
                if (res && res.ok) {
                    statusEl.textContent = `✅ Logged: ${name}`;
                    statusEl.className = 'status success';
                    addLogItem(name, res.remarks, true);
                    try { new Audio("https://actions.google.com/sounds/v1/ui/message_notification.ogg").play(); } catch(e){}
                } else {
                    statusEl.textContent = `❌ Error: ${res.error}`;
                    statusEl.className = 'status error';
                    addLogItem(name, res.error, false);
                }

                setTimeout(() => {
                    isLogging = false;
                    statusEl.textContent = 'Ready. Face the camera.';
                    statusEl.className = 'status ready';
                }, 3000);

            }).withFailureHandler(function(err) {
                statusEl.textContent = 'Network Error';
                statusEl.className = 'status error';
                addLogItem(name, "Network Error", false);
                setTimeout(() => { isLogging = false; }, 3000);
            }).processAttendanceFromFaceScan(code); // Works with your existing Server.js code!
        }

        function addLogItem(name, msg, isSuccess) {
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            if(logHistoryEl.innerHTML.includes('Waiting for scans...')) logHistoryEl.innerHTML = '';
            
            const item = document.createElement('div');
            item.className = `log-item ${isSuccess ? 'success' : 'error'}`;
            item.innerHTML = `
                <div class="log-time">${timeStr}</div>
                <h4 class="log-name">${name}</h4>
                <p class="log-msg">${msg}</p>
            `;
            logHistoryEl.prepend(item);

            if(logHistoryEl.children.length > 50) { logHistoryEl.removeChild(logHistoryEl.lastChild); }
        }
    </script>
</body>
</html>
