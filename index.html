<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Mikana AI Kiosk (Enterprise)</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
  
  <script>
    // =========================================================================
    // ⚠️ YOUR GOOGLE WEB APP URL:
    // =========================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0TytppAu3jEDM5c_tu8tyO_mMn5Puco8sPEHYmrky3U9qzh_E8BUuI9UTeYOv_ND-OA/exec"; 
    
    async function fetchAPI(params) {
      const url = new URL(SCRIPT_URL);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      url.searchParams.append('t', Date.now()); 
      try {
        const response = await fetch(url.toString(), { method: 'GET', mode: 'cors', cache: 'no-store' });
        return await response.json();
      } catch(e) { throw e; }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    html, body { height: 100%; margin: 0; padding: 0; background: #0f172a; overflow: hidden; color: #f8fafc; }
    
    /* GEOFENCE OVERLAY */
    #geoOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; transition: opacity 0.4s ease; }
    #geoOverlay .spinner { width: 50px; height: 50px; border: 4px solid rgba(99, 102, 241, 0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
    #geoOverlay h1 { font-size: 32px; font-weight: 900; margin: 0 0 10px 0; color: #f8fafc; letter-spacing: -0.5px; }
    #geoOverlay p { font-size: 15px; font-weight: 500; color: #94a3b8; max-width: 400px; line-height: 1.5; margin: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LOADING OVERLAY (DATABASE) */
    #loadingOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 99990; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
    #loadingOverlay .loader { width: 60px; height: 60px; position: relative; margin-bottom: 25px; }
    #loadingOverlay .loader::before, #loadingOverlay .loader::after { content: ''; position: absolute; inset: 0; border-radius: 50%; box-shadow: 0 4px 0 0 #34d399; animation: pulse 1.5s linear infinite; }
    #loadingOverlay .loader::after { animation-delay: 0.75s; }
    @keyframes pulse { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
    #loadingOverlay h2 { font-size: 24px; font-weight: 900; margin: 0; color: #ffffff; letter-spacing: 1px; }

    /* MAIN LAYOUT */
    .layout { display: flex; width: 100vw; height: 100vh; position: relative; }
    
    /* LEFT: CAMERA */
    .cam-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }
    .logo-container { position: absolute; top: 30px; left: 40px; display: flex; align-items: center; gap: 15px; z-index: 20; }
    .logo-container img { width: 45px; height: 45px; object-fit: contain; }
    .logo-container div { display: flex; flex-direction: column; }
    .logo-container h1 { margin: 0; font-size: 24px; font-weight: 900; color: #ffffff; letter-spacing: -0.5px; line-height: 1.1; }
    .logo-container p { margin: 0; font-size: 11px; font-weight: 700; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }

    .video-wrapper { position: relative; width: 100%; max-width: 650px; aspect-ratio: 3/4; background: #1e293b; border-radius: 36px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 8px solid #334155; transition: border-color 0.3s; }
    .video-wrapper.scanning { border-color: #6366f1; box-shadow: 0 0 50px rgba(99, 102, 241, 0.3); }
    .video-wrapper.success { border-color: #10b981; box-shadow: 0 0 50px rgba(16, 185, 129, 0.3); }
    .video-wrapper.error { border-color: #ef4444; box-shadow: 0 0 50px rgba(239, 68, 68, 0.3); }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); z-index: 5; pointer-events: none; }

    .scanner-guide { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
    .scanner-guide::before { content: ''; position: absolute; top: 15%; left: 15%; right: 15%; bottom: 15%; border: 2px dashed rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
    .video-wrapper.scanning .scanner-guide::before { border-color: rgba(99, 102, 241, 0.8); animation: spinGuide 4s linear infinite; }
    @keyframes spinGuide { to { transform: rotate(360deg); } }

    .status-badge { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 14px 30px; border-radius: 99px; font-size: 16px; font-weight: 800; color: #f8fafc; border: 1px solid rgba(255,255,255,0.1); z-index: 10; white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    .status-badge.processing { background: #451a03; border-color: #f59e0b; color: #fbbf24; }
    .status-badge.success { background: #064e3b; border-color: #10b981; color: #34d399; }
    .status-badge.error { background: #450a0a; border-color: #ef4444; color: #f87171; }
    .status-icon { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: currentColor; }
    .status-badge.processing .status-icon { animation: blink 1s infinite alternate; }

    /* RIGHT: LOGS */
    .log-panel { width: 380px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; z-index: 20; box-shadow: -10px 0 30px rgba(0,0,0,0.3); }
    .log-header { padding: 30px 25px 20px 25px; border-bottom: 1px solid #334155; background: #0f172a; }
    .log-header h2 { margin: 0; font-size: 20px; font-weight: 900; color: #f8fafc; letter-spacing: -0.5px; }
    .log-header p { margin: 5px 0 0 0; font-size: 13px; font-weight: 500; color: #94a3b8; }
    
    .log-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .log-list::-webkit-scrollbar { width: 6px; }
    .log-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

    .log-card { background: #0f172a; border-radius: 16px; padding: 16px; border-left: 4px solid #334155; animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; gap: 15px; align-items: center; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    .log-card.success { border-left-color: #10b981; }
    .log-card.error { border-left-color: #ef4444; }
    
    .log-avatar { width: 45px; height: 45px; border-radius: 12px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .log-card.success .log-avatar { background: #064e3b; color: #34d399; }
    .log-card.error .log-avatar { background: #450a0a; color: #f87171; }
    
    .log-info { flex: 1; overflow: hidden; }
    .log-time { font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .log-name { font-size: 15px; font-weight: 800; color: #f8fafc; margin: 0 0 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-msg { font-size: 12px; font-weight: 600; margin: 0; color: #94a3b8; }
    .log-card.success .log-msg { color: #34d399; }
    .log-card.error .log-msg { color: #f87171; }

    .empty-logs { text-align: center; color: #64748b; font-size: 13px; font-weight: 600; margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .empty-logs svg { opacity: 0.5; }

    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .log-panel { width: 100%; height: 35vh; border-left: none; border-top: 1px solid #334155; }
      .cam-panel { height: 65vh; padding: 15px; padding-bottom: 90px; }
      .video-wrapper { max-height: 100%; border-width: 6px; }
      .logo-container { top: 15px; left: 15px; }
      .logo-container h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div id="geoOverlay">
    <div id="geoSpinner" class="spinner"></div>
    <h1 id="geoTitle">Verifying Location</h1>
    <p id="geoMsg">Checking if this terminal is within the allowed office zone...</p>
  </div>

  <div id="loadingOverlay">
    <div class="loader"></div>
    <h2 id="loadingText">INITIALIZING SYSTEM</h2>
  </div>

  <div class="layout">
    
    <div class="cam-panel">
      <div class="logo-container">
        <img src="https://cdn-icons-png.flaticon.com/512/9634/9634354.png" alt="Logo">
        <div>
          <h1>MIKANA</h1>
          <p>AI Terminal</p>
        </div>
      </div>

      <div id="videoContainer" class="video-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <div class="scanner-guide"></div>
      </div>
      
      <div id="statusBadge" class="status-badge">
        <span class="status-icon"></span>
        <span id="statusText">System Booting...</span>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <h2>Live Feed</h2>
        <p>Real-time attendance logs</p>
      </div>
      <div class="log-list" id="logList">
        <div class="empty-logs" id="emptyLogs">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M12 6v6l4 2"></path></svg>
          Waiting for scans...
        </div>
      </div>
    </div>

  </div>

  <script>
    // =========================================================================
    // 📍 GEOFENCING SETTINGS
    // =========================================================================
    const OFFICE_LAT = 14.64369; 
    const OFFICE_LON = 120.98446; 
    const MAX_DISTANCE_METERS = 50;

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
      const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function showGeoError(title, msg) {
      const geoOverlay = document.getElementById('geoOverlay');
      document.getElementById('geoSpinner').style.display = 'none';
      document.getElementById('geoTitle').textContent = title;
      document.getElementById('geoTitle').style.color = '#ef4444';
      document.getElementById('geoMsg').innerHTML = msg + `<br><br><button onclick="location.reload()" style="padding:12px 24px; background:#38bdf8; color:#000; border:none; border-radius:12px; font-weight:900; cursor:pointer; transition:0.2s;">RETRY LOCATION</button>`;
    }
    
    function verifyLocationAndStart() {
        if (!navigator.geolocation) return showGeoError("UNSUPPORTED DEVICE", "Your device or browser does not support GPS location.");
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const distance = getDistance(OFFICE_LAT, OFFICE_LON, position.coords.latitude, position.coords.longitude);
                if (distance <= MAX_DISTANCE_METERS) { 
                    document.getElementById('geoOverlay').style.opacity = '0';
                    setTimeout(() => { document.getElementById('geoOverlay').style.display = 'none'; }, 400);
                    runStartupEmployeeUpdate(); 
                } 
                else { showGeoError("ACCESS DENIED", `You are too far from the office.<br>Distance: ${Math.round(distance)} meters away.`); }
            },
            (error) => {
                let msg = "Could not get your location.";
                if (error.code === 1) msg = "You blocked the location request. Please allow location access in your browser settings.";
                if (error.code === 2) msg = "Your GPS signal is unavailable right now.";
                if (error.code === 3) msg = "The location request timed out.";
                showGeoError("LOCATION REQUIRED", msg);
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }
    
    window.addEventListener("DOMContentLoaded", verifyLocationAndStart);


    // =========================================================================
    // 🧠 AI SCANNER SYSTEM (WITH LOCAL MEMORY INJECTED)
    // =========================================================================
    const video = document.getElementById('video');
    const statusText = document.getElementById('statusText');
    const statusBadge = document.getElementById('statusBadge');
    const videoWrapper = document.getElementById('videoContainer');
    
    let faceMatcher;
    let isProcessing = false;
    let lastLoggedFace = "";
    let logCooldownTimer;

    // 🔥 MODIFIED: Instant Boot + Silent Sync logic
    function runStartupEmployeeUpdate() {
      const loadingOverlay = document.getElementById('loadingOverlay');
      const loadingText = document.getElementById('loadingText');
      
      // 1. Check Local Storage First
      const cachedDb = localStorage.getItem('mikana_face_db_v1');
      
      if (cachedDb) {
          console.log("Loading face database from local cache...");
          try {
              const parsedData = JSON.parse(cachedDb);
              buildFaceMatcher(parsedData).then(() => {
                  loadingOverlay.style.display = 'none';
                  startCamera();
                  // 2. Trigger silent sync in the background
                  silentBackgroundSync();
              });
          } catch (e) {
              console.error("Cache corrupted, fetching fresh...", e);
              fetchFreshData(loadingOverlay, loadingText);
          }
      } else {
          // No cache found, fetch fresh
          fetchFreshData(loadingOverlay, loadingText);
      }
    }

    // 🔥 NEW: First time fetch logic
    function fetchFreshData(loadingOverlay, loadingText) {
      loadingOverlay.style.display = 'flex';
      loadingText.innerHTML = "DOWNLOADING AI FACE DATABASE...<br><span style='font-size:14px; font-weight:600; color:#94a3b8; margin-top:8px; display:block;'>This may take 10-30 seconds depending on connection</span>";

      google.script.run.withSuccessHandler(async function(data) {
          if (!data || data.length === 0) {
              loadingText.innerHTML = "DATABASE EMPTY.<br>Please add employees first.";
              loadingText.style.color = "#ef4444";
              return;
          }
          
          // Save the fresh data to local memory
          localStorage.setItem('mikana_face_db_v1', JSON.stringify(data));
          
          loadingText.innerHTML = "BUILDING NEURAL NETWORK...<br><span style='font-size:14px; color:#34d399;'>Compiling " + data.length + " face profiles</span>";
          await buildFaceMatcher(data);
          loadingOverlay.style.display = 'none';
          startCamera();
      }).withFailureHandler(function(err) {
          loadingText.innerHTML = "NETWORK ERROR.<br>Please refresh the page.";
          loadingText.style.color = "#ef4444";
          console.error(err);
      }).getEmployeeFaceData();
    }

    // 🔥 NEW: Silent background updater
    function silentBackgroundSync() {
      console.log("Running silent background sync...");
      google.script.run.withSuccessHandler(async function(data) {
          if (!data || data.length === 0) return;
          // Update cache with the latest data
          localStorage.setItem('mikana_face_db_v1', JSON.stringify(data));
          // Silently rebuild the face matcher with new data
          await buildFaceMatcher(data);
          console.log("Neural network updated silently in background.");
      }).withFailureHandler(function(err) {
          console.error("Silent background sync failed:", err);
      }).getEmployeeFaceData();
    }

    async function buildFaceMatcher(data) {
      try {
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
          faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
          faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights')
        ]);
        const labeledDescriptors = data.map(emp => {
          const descriptors = JSON.parse(emp.descriptors).map(d => new Float32Array(Object.values(d)));
          return new faceapi.LabeledFaceDescriptors(emp.label, descriptors);
        });
        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45); 
      } catch(e) { throw e; }
    }

    function setStatus(text, type) {
      statusText.textContent = text;
      statusBadge.className = 'status-badge ' + type;
      videoWrapper.className = 'video-wrapper ' + type;
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } })
      .then(stream => { video.srcObject = stream; setStatus("Ready. Face the camera.", "ready"); })
      .catch(err => { setStatus("Camera permission denied", "error"); console.error(err); });
    }

    video.addEventListener('play', () => {
      const canvas = faceapi.createCanvasFromMedia(video);
      videoWrapper.append(canvas);
      const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
      faceapi.matchDimensions(canvas, displaySize);

      setInterval(async () => {
        if (isProcessing || !faceMatcher) return;

        setStatus("Scanning...", "scanning");
        
        const detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.6 })).withFaceLandmarks().withFaceDescriptors();
        const resizedDetections = faceapi.resizeResults(detections, displaySize);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (resizedDetections.length > 0) {
          const detection = resizedDetections[0];
          const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

          ctx.lineWidth = 6;
          ctx.strokeStyle = bestMatch.label !== 'unknown' ? '#10b981' : '#ef4444'; 
          const box = detection.detection.box;
          const cornerLen = 30;
          ctx.beginPath();
          ctx.moveTo(box.x, box.y + cornerLen); ctx.lineTo(box.x, box.y); ctx.lineTo(box.x + cornerLen, box.y);
          ctx.moveTo(box.x + box.width - cornerLen, box.y); ctx.lineTo(box.x + box.width, box.y); ctx.lineTo(box.x + box.width, box.y + cornerLen);
          ctx.moveTo(box.x, box.y + box.height - cornerLen); ctx.lineTo(box.x, box.y + box.height); ctx.lineTo(box.x + cornerLen, box.y + box.height);
          ctx.moveTo(box.x + box.width - cornerLen, box.y + box.height); ctx.lineTo(box.x + box.width, box.y + box.height); ctx.lineTo(box.x + box.width, box.y + box.height - cornerLen);
          ctx.stroke();

          if (bestMatch.label !== 'unknown') {
            if (lastLoggedFace !== bestMatch.label) { processLog(bestMatch.label); }
          } else { setStatus("Unknown Face", "error"); }
        } else {
          setStatus("Ready. Face the camera.", "ready");
          if(lastLoggedFace) { clearTimeout(logCooldownTimer); logCooldownTimer = setTimeout(() => { lastLoggedFace = ""; }, 4000); }
        }
      }, 150);
    });

    function processLog(label) {
      isProcessing = true;
      lastLoggedFace = label;
      
      let parts = label.split(" | "); let empCode = parts[0] ? parts[0].trim() : label; let empName = parts[1] ? parts[1].trim() : empCode;
      
      setStatus(`Logging ${empName}...`, "processing");

      google.script.run.withSuccessHandler(function(res) {
          if (res && res.ok) {
              setStatus(`Logged: ${empName}`, "success");
              addLogToUI(empName, res.remarks, true);
              try { new Audio("https://actions.google.com/sounds/v1/ui/message_notification.ogg").play(); } catch(e){}
          } else {
              setStatus(`Error: ${res.error || 'Failed'}`, "error");
              addLogToUI(empName, res.error || 'Failed to log', false);
          }
          setTimeout(() => { isProcessing = false; setStatus("Ready. Face the camera.", "ready"); }, 3500);
      }).withFailureHandler(function(err) {
          setStatus("Network Error", "error");
          addLogToUI(empName, "Network timeout. Try again.", false);
          setTimeout(() => { isProcessing = false; }, 3500);
      }).processAttendanceFromFaceScan(empCode);
    }

    function addLogToUI(name, msg, isSuccess) {
      const list = document.getElementById('logList');
      const empty = document.getElementById('emptyLogs');
      if(empty) empty.style.display = 'none';

      const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      const el = document.createElement('div');
      el.className = `log-card ${isSuccess ? 'success' : 'error'}`;
      el.innerHTML = `
        <div class="log-avatar">${isSuccess ? '✓' : '✗'}</div>
        <div class="log-info">
            <div class="log-time">${timeStr}</div>
            <h4 class="log-name">${name}</h4>
            <p class="log-msg">${msg}</p>
        </div>
      `;
      list.prepend(el);
      if(list.children.length > 50) list.removeChild(list.lastChild);
    }
  </script>
</body>
</html>
