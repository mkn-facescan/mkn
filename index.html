<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Mikana AI Kiosk (Enterprise)</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
  
  <script>
    // =========================================================================
    // ⚠️ YOUR GOOGLE WEB APP URL:
    // =========================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0TytppAu3jEDM5c_tu8tyO_mMn5Puco8sPEHYmrky3U9qzh_E8BUuI9UTeYOv_ND-OA/exec"; 
    
    // Legacy GET requests (for simple fetches)
    async function fetchAPI(params) {
      const url = new URL(SCRIPT_URL);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      try {
        const response = await fetch(url.toString(), { method: 'GET', mode: 'cors' });
        return await response.json();
      } catch(e) { console.error("API Error:", e); throw e; }
    }

    // NEW POST requests (for massive image files)
    async function postAPI(payload) {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch(e) { console.error("POST Error:", e); throw e; }
    }
  </script>

  <style>
    :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --sub: #94a3b8; --border: #334155; --accent: #38bdf8; --success: #10b981; --error: #ef4444; --warning: #f59e0b; }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; }
    
    body.flash-success .cam-container { box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); border-color: var(--success); }
    body.flash-error .cam-container { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); border-color: var(--error); }

    .gate { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(8px); padding: 20px; }
    .gateCard { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .gateTitle { font-size: 20px; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
    .gateInput { width: 100%; background: var(--bg); border: 2px solid var(--border); color: white; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 16px; text-align: center; font-weight: bold; outline: none; }
    .gateBtn { width: 100%; background: var(--accent); color: #000; font-weight: 900; font-size: 16px; padding: 15px; border: none; border-radius: 12px; cursor: pointer; }
    .gateErr { color: var(--error); font-size: 14px; font-weight: bold; margin-top: 10px; min-height: 20px; }

    #viewport { display: none; flex-direction: column; height: 100vh; padding: 15px; gap: 15px; max-width: 1200px; margin: 0 auto; }
    
    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-radius: 16px; border: 1px solid var(--border); flex-shrink: 0; }
    .header-title { font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 10px; }
    
    .nav-buttons { display: flex; gap: 8px; }
    .mode-btn { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .header-clock { text-align: right; }
    .time { font-size: 20px; font-weight: 900; }
    .date { font-size: 12px; color: var(--sub); font-weight: 600; text-transform: uppercase; }

    .cam-container { flex: 1; position: relative; background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--border); transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.4); display:flex; flex-direction:column; }
    
    .video-wrap { flex: 1; position: relative; width: 100%; overflow:hidden; }
    video { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); pointer-events: none; }
    
    .capture-btn-wrap { padding: 15px; background: var(--panel); border-top: 1px solid var(--border); text-align: center; z-index: 20; }
    .capture-btn { width: 100%; max-width: 400px; background: var(--accent); color: #000; padding: 20px; border-radius: 16px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transition: transform 0.1s; }
    .capture-btn:active { transform: scale(0.96); }

    .ai-status-overlay { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px; font-weight: 900; font-size: 14px; color: var(--warning); z-index: 10; border: 1px solid rgba(255,255,255,0.1); }

    .confirm-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .confirm-box { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--accent); width: 100%; max-width: 450px; }
    .confirm-name { font-size: 26px; color: #fff; font-weight: 900; margin: 10px 0 30px 0; }
    .action-row { display: flex; flex-direction: column; gap: 12px; }
    .btn-time-in { background: var(--success); color: #fff; padding: 18px; border-radius: 12px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; display: none; }
    .btn-time-out { background: var(--error); color: #fff; padding: 18px; border-radius: 12px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; display: none; }
    .btn-cancel { background: transparent; color: var(--sub); padding: 15px; border-radius: 12px; border: 2px solid var(--border); font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }

    /* MULTI-PANEL SYSTEM */
    .panel-wrapper { position: relative; flex-shrink: 0; height: 140px; }
    .bottom-panel { position: absolute; inset: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 15px; display: none; align-items: center; gap: 15px; overflow-y: auto; }
    .bottom-panel.active { display: flex; }

    /* INFO CARD (SCAN MODE) */
    .avatar-wrapper { width: 80px; height: 80px; border-radius: 50%; background: var(--bg); border: 3px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .emp-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .emp-name { font-size: 24px; font-weight: 900; margin: 0 0 4px 0; color: var(--text); }
    .status-pill { align-self: flex-start; padding: 6px 14px; border-radius: 12px; font-size: 14px; font-weight: 900; background: var(--bg); border: 1px solid var(--border); color: var(--sub); }

    /* QR MODE CARD */
    .qr-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .qr-input { width: 100%; background: var(--bg); border: 2px solid var(--accent); color: white; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; text-align: center; text-transform: uppercase; outline: none; }
    .qr-btn-row { display: flex; gap: 10px; }
    .qr-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; color: #fff; }
    
    /* REGISTRATION FORM CARD */
    .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .reg-input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-size: 14px; outline: none; }
    .reg-input:disabled { opacity: 0.6; cursor: not-allowed; border-color: var(--accent); color: var(--accent); font-weight: bold;}
    .reg-input.full { grid-column: span 2; }
    .reg-submit-btn { grid-column: span 2; background: var(--accent); color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; }

    .status-in { background: rgba(16, 185, 129, 0.15); border-color: var(--success); color: var(--success); }
    .status-out { background: rgba(239, 68, 68, 0.15); border-color: var(--error); color: var(--error); }
    .status-proc { background: rgba(245, 158, 11, 0.15); border-color: var(--warning); color: var(--warning); }
  </style>
</head>
<body>

<div id="adminGate" class="gate">
  <div class="gateCard">
    <div class="gateTitle">🤖 AI KIOSK ACCESS</div>
    <input id="adminPass" class="gateInput" type="password" placeholder="Admin Password" />
    <button id="adminBtn" class="gateBtn" type="button">UNLOCK</button>
    <div id="adminErr" class="gateErr"></div>
  </div>
</div>

<div id="viewport">
  <div class="header">
    <div class="header-title">🤖 TEAMBA</div>
    <div class="nav-buttons">
        <button class="mode-btn active" id="btnModeScan" onclick="switchMode('SCAN')">FACE SCAN</button>
        <button class="mode-btn" id="btnModeQR" onclick="switchMode('QR')">QR CODE</button>
        <button class="mode-btn" id="btnModeReg" onclick="switchMode('REGISTER')">NEW HR REG</button>
    </div>
    <div class="header-clock">
      <div class="time" id="clock">00:00:00</div>
      <div class="date" id="clockDate">—</div>
    </div>
  </div>

  <div class="cam-container" id="camContainer">
    <div class="video-wrap">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
        <div class="ai-status-overlay" id="aiStatus" style="display:none;"></div>
    </div>
    
    <div class="capture-btn-wrap" id="captureWrap">
        <button class="capture-btn" id="captureBtn" onclick="captureAndAnalyze()">📸 CAPTURE & RECOGNIZE</button>
    </div>
    
    <div class="confirm-overlay" id="confirmModal">
        <div class="confirm-box">
            <div style="color:var(--sub); font-weight:bold;">EMPLOYEE IDENTIFIED</div>
            <div class="confirm-name" id="confirmName">ARCHIE (MIK-235)</div>
            <div class="action-row">
                <button class="btn-time-in" id="btnTimeIn" onclick="submitScan('IN')">🟢 TIME IN</button>
                <button class="btn-time-out" id="btnTimeOut" onclick="submitScan('OUT')">🔴 TIME OUT</button>
                <button class="btn-cancel" onclick="resetScanner()">❌ CANCEL / RETRY</button>
            </div>
        </div>
    </div>
  </div>

  <div class="panel-wrapper">
    <div class="bottom-panel active" id="panelScan">
      <div class="avatar-wrapper" id="avatarBox"><div class="avatar-placeholder">👤</div></div>
      <div class="emp-details">
        <h2 class="emp-name" id="empName">WAITING FOR SCAN</h2>
        <div class="status-pill" id="statusLine">READY</div>
      </div>
    </div>

    <div class="bottom-panel" id="panelQR">
        <div class="qr-input-wrap">
            <input type="text" class="qr-input" id="qrInput" placeholder="SCAN OR TYPE CODE HERE (e.g. MIK-235)">
            <div class="qr-btn-row">
                <button class="qr-btn" style="background:var(--success)" onclick="submitQR('IN')">📸 TIME IN</button>
                <button class="qr-btn" style="background:var(--error)" onclick="submitQR('OUT')">📸 TIME OUT</button>
            </div>
        </div>
    </div>

    <div class="bottom-panel" id="panelReg" style="height: 220px; top: -80px;">
        <div class="reg-grid">
            <input type="text" class="reg-input" id="regCode" disabled placeholder="FETCHING NEXT CODE...">
            <input type="text" class="reg-input" id="regName" placeholder="Full Name">
            
            <select class="reg-input" id="regDept">
                <option value="" disabled selected>Select Dept</option>
                <option value="ASSEMBLY">ASSEMBLY</option>
                <option value="WAREHOUSE">WAREHOUSE</option>
                <option value="OFFICE">OFFICE</option>
            </select>
            
            <select class="reg-input" id="regShift">
                <option value="" disabled selected>Select Shift</option>
                <option value="MORNING">MORNING</option>
                <option value="NIGHT">NIGHT</option>
            </select>
            
            <input type="text" class="reg-input" id="regMobile" placeholder="Mobile Number">
            <select class="reg-input" id="regStatus"><option value="ACTIVE">ACTIVE</option></select>
            
            <input type="text" class="reg-input full" id="regAddress" placeholder="Home Address">
            <button class="reg-submit-btn" onclick="submitRegistration()">📸 MAP FACE & SAVE HR RECORD</button>
        </div>
    </div>
  </div>
</div>

<script>
  function triggerSuccessFeedback() { document.body.classList.add('flash-success'); setTimeout(() => { document.body.classList.remove('flash-success'); }, 400); }
  function triggerErrorFeedback() { document.body.classList.add('flash-error'); setTimeout(() => { document.body.classList.remove('flash-error'); }, 400); }

  let adminToken = "";
  let currentMode = "SCAN"; 
  let globalFacesMap = {}; 
  let pendingEmpCode = ""; 
  let localAttendanceCache = {}; 
  
  const adminGate = document.getElementById('adminGate');
  const adminPass = document.getElementById('adminPass');
  const adminBtn  = document.getElementById('adminBtn');
  const viewport  = document.getElementById('viewport');

  // Utility: Capture current frame as Base64 Image
  function capturePhotoBase64() {
      const vid = document.getElementById('video');
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = vid.videoWidth;
      tempCanvas.height = vid.videoHeight;
      const ctx = tempCanvas.getContext('2d');
      // Flip the context so the saved image isn't mirrored
      ctx.translate(tempCanvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(vid, 0, 0, tempCanvas.width, tempCanvas.height);
      return tempCanvas.toDataURL('image/jpeg', 0.8); // 80% quality JPEG
  }

  function unlockApp(){
    adminGate.style.display = "none";
    viewport.style.display = "flex";
    runStartupEmployeeUpdate();
  }

  async function tryUnlock(){
    const p = String(adminPass.value || "");
    if (!p) return alert("ENTER PASSWORD");
    adminBtn.disabled = true;
    try {
      const res = await fetchAPI({ page: 'api_verify_admin', pass: p });
      adminBtn.disabled = false;
      if (res && res.ok && res.token){
        adminToken = res.token; unlockApp();
      } else {
        adminPass.value = ""; alert("WRONG PASSWORD");
      }
    } catch(err) { adminBtn.disabled = false; alert("SERVER ERROR"); }
  }

  adminBtn.addEventListener('click', tryUnlock);
  adminPass.addEventListener('keydown', (e)=>{ if (e.key === "Enter"){ e.preventDefault(); tryUnlock(); } });

  function tick(){
    const d = new Date();
    document.getElementById('clock').textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    document.getElementById('clockDate').textContent = `${["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }
  setInterval(tick, 1000); tick();

  // --- MODE SWITCHER ---
  function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.bottom-panel').forEach(p => p.classList.remove('active'));
      
      const capBtn = document.getElementById('captureWrap');
      
      if(mode === 'SCAN') {
          document.getElementById('btnModeScan').classList.add('active');
          document.getElementById('panelScan').classList.add('active');
          capBtn.style.display = "block";
      } else if (mode === 'QR') {
          document.getElementById('btnModeQR').classList.add('active');
          document.getElementById('panelQR').classList.add('active');
          capBtn.style.display = "none";
          document.getElementById('qrInput').focus();
      } else if (mode === 'REGISTER') {
          document.getElementById('btnModeReg').classList.add('active');
          document.getElementById('panelReg').classList.add('active');
          capBtn.style.display = "none";
          fetchNextEmployeeCode(); // Ask server for next code
      }
  }

  const empNameEl = document.getElementById('empName');
  const statusLineEl = document.getElementById('statusLine');
  const avatarBox = document.getElementById('avatarBox');

  function setStatusLine(s, type){
    statusLineEl.textContent = String(s || "READY").trim().toUpperCase();
    statusLineEl.className = "status-pill";
    if (type === "proc") statusLineEl.classList.add("status-proc");
    if (type === "in") { statusLineEl.classList.add("status-in"); triggerSuccessFeedback(); }
    if (type === "out") { statusLineEl.classList.add("status-out"); triggerErrorFeedback(); }
  }

  function setAvatar(src){
    if (!src){ avatarBox.innerHTML = '<div class="avatar-placeholder">👤</div>'; return; }
    avatarBox.innerHTML = `<img src="${src}?v=${Date.now()}">`;
  }

  // --- AI ENGINE & DATABASE ---
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const aiStatus = document.getElementById('aiStatus');
  let faceMatcher = null;

  async function runStartupEmployeeUpdate(){
    setStatusLine("UPDATING...", "proc");
    try {
      await fetchAPI({ page: 'api_startup' });
      setStatusLine("READY", "");
      startAIEngine();
    } catch(err) { setStatusLine("ERROR", "out"); }
  }

  async function startAIEngine() {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
      aiStatus.style.display = "block";
      aiStatus.textContent = "LOADING AI MODELS...";
      
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      
      try {
          aiStatus.textContent = "LOADING DATABASE...";
          const res = await fetchAPI({ page: 'api_get_faces' });
          if(res.ok && res.faces) {
              const labeledDescriptors = res.faces.map(f => {
                 globalFacesMap[f.code] = f.name; 
                 const float32Array = new Float32Array(JSON.parse(f.descriptor));
                 return new faceapi.LabeledFaceDescriptors(f.code, [float32Array]); 
              });
              if(labeledDescriptors.length > 0) faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45); 
          }
          
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
          video.srcObject = stream;
          video.onloadedmetadata = () => { overlay.width = video.clientWidth; overlay.height = video.clientHeight; aiStatus.style.display = "none"; };
      } catch(e) { aiStatus.textContent = "CAMERA ERROR"; }
  }

  // --- MODE 1: FACE SCAN (MANUAL CAPTURE) ---
  async function captureAndAnalyze() {
      if(!faceMatcher) return alert("Database empty or loading.");
      const ctx = overlay.getContext('2d'); ctx.clearRect(0, 0, overlay.width, overlay.height);

      try {
          const options = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 });
          const detection = await faceapi.detectSingleFace(video, options).withFaceLandmarks().withFaceDescriptor();
          
          if (!detection) throw new Error("NO FACE DETECTED");

          const displaySize = { width: video.clientWidth, height: video.clientHeight };
          const resizedDetection = faceapi.resizeResults(detection, displaySize);
          const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
          
          if (bestMatch.label !== "unknown" && bestMatch.distance < 0.45) {
              const drawBox = new faceapi.draw.DrawBox(resizedDetection.detection.box, { label: bestMatch.label, boxColor: '#10b981' });
              drawBox.draw(overlay);
              
              pendingEmpCode = bestMatch.label;
              document.getElementById('confirmName').textContent = `${globalFacesMap[pendingEmpCode] || pendingEmpCode} (${pendingEmpCode})`;
              
              const lastStatus = localAttendanceCache[pendingEmpCode] || "OUT";
              document.getElementById('btnTimeIn').style.display = lastStatus === "OUT" ? "block" : "none";
              document.getElementById('btnTimeOut').style.display = lastStatus === "OUT" ? "none" : "block";
              
              document.getElementById('confirmModal').style.display = 'flex';
          } else {
              const drawBox = new faceapi.draw.DrawBox(resizedDetection.detection.box, { label: "Unrecognized", boxColor: '#ef4444' });
              drawBox.draw(overlay);
              throw new Error("UNRECOGNIZED FACE");
          }
      } catch (err) {
          empNameEl.textContent = err.message; setStatusLine("ACCESS DENIED", "out"); triggerErrorFeedback(); 
          setTimeout(resetScanner, 3000);
      }
  }

  function resetScanner() {
      document.getElementById('confirmModal').style.display = 'none';
      pendingEmpCode = "";
      empNameEl.textContent = "WAITING FOR SCAN"; setStatusLine("READY", ""); setAvatar("");
      const ctx = overlay.getContext('2d'); ctx.clearRect(0, 0, overlay.width, overlay.height);
  }

  // CORE SUBMIT (Used by Face Scan)
  async function submitScan(actionType){
    document.getElementById('confirmModal').style.display = 'none';
    setStatusLine("SAVING " + actionType + "...", "proc");
    
    // 📸 Take the picture!
    const photoB64 = capturePhotoBase64();

    try {
      // ⚠️ WE WILL CHANGE THIS TO postAPI ONCE THE BACKEND IS READY
      console.log("Preparing to send POST request with Image Data...");
      
      const res = await fetchAPI({ page: 'api_scan', code: pendingEmpCode, adminToken: adminToken, action: actionType });
      if(!res || !res.ok) throw new Error(res.statusLine || "FAILED");

      localAttendanceCache[pendingEmpCode] = res.action || actionType;
      setStatusLine(`${actionType} RECORDED`, actionType === "IN" ? "in" : "out");
      setTimeout(resetScanner, 3500);

    } catch(err) {
      setStatusLine(err.message || "SERVER TIMEOUT", "out");
      setTimeout(resetScanner, 3500);
    }
  }

  // --- MODE 2: QR / MANUAL SUBMIT ---
  async function submitQR(actionType) {
      const code = document.getElementById('qrInput').value.trim().toUpperCase();
      if(!code) return alert("Please type or scan a code first.");
      
      // 📸 Snap the photo automatically on click!
      const photoB64 = capturePhotoBase64();
      alert(`Backend update required to save ${code} for ${actionType} with Photo.\nImage captured successfully!`);
      document.getElementById('qrInput').value = "";
  }

  // --- MODE 3: HR REGISTRATION ---
  async function fetchNextEmployeeCode() {
      // ⚠️ Mocked until backend is ready
      document.getElementById('regCode').value = "MIK-236 (Mock)";
  }

  async function submitRegistration() {
      const code = document.getElementById('regCode').value.replace(" (Mock)", "");
      const name = document.getElementById('regName').value;
      const dept = document.getElementById('regDept').value;
      
      if(!name || !dept) return alert("Please fill out the name and department.");

      aiStatus.style.display = "block"; aiStatus.textContent = "MAPPING FACE... HOLD STILL";
      
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if(!detection) { aiStatus.style.display = "none"; return alert("ERROR: NO FACE DETECTED."); }
      
      // 📸 Snap the profile photo!
      const photoB64 = capturePhotoBase64();
      const descStr = JSON.stringify(Array.from(detection.descriptor));
      
      aiStatus.textContent = "PREPARING UPLOAD...";
      
      // ⚠️ To be replaced with postAPI
      alert(`Backend update required to process Full HR Profile + Face Map + Photo Upload for ${name}.`);
      aiStatus.style.display = "none";
  }
</script>
</body>
</html>
